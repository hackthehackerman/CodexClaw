[bot]
name = "Yanny"
aliases = ["yanny"]
soul_path = "./personality/soul.md"
workspace_id = "main"
allow_self_messages = false

[codex]
command = ["codex", "app-server"]
approval_policy = "on-request"
sandbox = "workspace-write"
network_access = "restricted"
model = "gpt-5.4"
effort = "medium"
summary = "concise"

[storage]
db_path = "./var/codexclaw.db"

[web]
enabled = true
host = "127.0.0.1"
port = 4188

[policy]
default = "deny"

# Fastest narrow setup:
# codexclaw init --telegram-chat 123456789 --telegram-bot-token "$TELEGRAM_BOT_TOKEN"
# codexclaw init --imessage-chat 'any;-;+15555550123' --bluebubbles-password "$BLUEBUBBLES_PASSWORD" --imessage-admin-sender '+15555550123'

# Start narrow. Uncomment exactly one of these while you get set up:
#
# [[allow]]
# kind = "conversation"
# transport_id = "primary-telegram"
# conversation_id = "123456789"
# label = "my Telegram DM"
#
# [[allow]]
# kind = "conversation"
# transport_id = "primary-imessage"
# conversation_id = "any;-;+15555550123"
# label = "my iMessage DM"
#
# After you know the bot works, you can widen access with rules like:
#
# [[allow]]
# kind = "direct_messages"
# transport_id = "primary-telegram"
# contact_scope = "any"
# label = "all Telegram direct messages"
#
# [[allow]]
# kind = "groups"
# transport_id = "primary-imessage"
# label = "all allowed iMessage groups"

# Configure at least one admin route if approval_policy is not "never".
# If no admin routes are configured, approvals are auto-declined.
#
# [[admins]]
# transport_id = "primary-telegram"
# conversation_id = "123456789"
# allowed_sender_ids = ["123456789"]
# command_format = "strict"

[[transports]]
id = "primary-imessage"
channel = "imessage"
provider = "bluebubbles"
enabled = false

[transports.triggers]
direct = "none"
group = "addressed"

[transports.config]
server_url = "http://127.0.0.1:1234"
password = "replace-with-bluebubbles-server-password"
webhook_listen_host = "127.0.0.1"
webhook_listen_port = 4101
webhook_path = "/webhooks/bluebubbles"
webhook_public_url = "http://127.0.0.1:4101/webhooks/bluebubbles"
webhook_token = "replace-with-random-token"
auto_register_webhook = true
webhook_events = ["new-message", "updated-message"]

[[transports]]
id = "primary-telegram"
channel = "telegram"
provider = "bot-api"
enabled = false

[transports.triggers]
direct = "none"
group = "addressed"

[transports.config]
bot_token = "replace-with-telegram-bot-token"
mode = "polling"
poll_timeout_seconds = 30
allowed_updates = ["message"]

[[workspaces]]
id = "main"
cwd = "/absolute/path/to/workspace"
